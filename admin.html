<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Auction Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-container">
        <header>
            <h1>AUCTION<span>PRO</span></h1>
            <button onclick="handleLogout()" class="logout-btn-top">Logout</button>
        </header>

        <!-- STEP 1: LEAGUE SETUP -->
        <section id="league-section" class="setup-card">
            <h2>Step 1: League Setup</h2>
            <div id="league-saved-msg" class="hidden"><div class="saved-badge">✓ League Info Saved</div></div>
            <div class="input-group">
                <label>League Name</label>
                <input type="text" id="league-name" placeholder="Enter League Name">
            </div>
            <div class="input-group">
                <label>Logo URL</label>
                <input type="text" id="league-logo" placeholder="https://...">
            </div>
            <button class="btn-primary" id="save-league-btn" onclick="saveLeagueSettings()">Confirm League Details</button>
        </section>

        <!-- STEP 2: TEAM SETUP -->
        <section id="team-section" class="setup-card hidden">
            <h2>Step 2: Add Teams</h2>
            <div class="form-grid">
                <div class="input-group"><label>Team Name</label><input type="text" id="team-name"></div>
                <div class="input-group"><label>Short Form</label><input type="text" id="team-short"></div>
                <div class="input-group"><label>Manager</label><input type="text" id="manager-name"></div>
                <div class="input-group"><label>Team Logo URL</label><input type="text" id="team-logo"></div>
            </div>
            <button class="btn-success" onclick="handleAddTeam()">+ Add Team to League</button>
            <div id="teams-list-container">
                <h3 class="section-label">PARTICIPATING TEAMS</h3>
                <div id="teams-display" class="team-grid"></div>
            </div>
            <button class="btn-primary" style="margin-top:40px; background:#f59e0b;" id="go-to-rules-btn" onclick="showRulesSection()">Next: Auction Rules →</button>
        </section>

        <!-- STEP 3: AUCTION RULES -->
        <section id="rules-section" class="setup-card hidden">
            <h2>Step 3: Auction Rules</h2>
            <div class="rules-grid">
                <div class="input-group"><label>Purse per Team ($)</label><input type="number" id="purse-value"></div>
                <div class="input-group"><label>Min Players</label><input type="number" id="min-players"></div>
                <div class="input-group"><label>Max Players</label><input type="number" id="max-players"></div>
            </div>
            <h3 class="sub-title">Role Limits</h3>
            <div class="rules-grid">
                <div class="input-group"><label>Min Batsmen</label><input type="number" id="min-bat" value="3"></div>
                <div class="input-group"><label>Min Bowlers</label><input type="number" id="min-bowl" value="3"></div>
                <div class="input-group"><label>Min All-Rounders</label><input type="number" id="min-ar" value="2"></div>
                <div class="input-group"><label>Min WKs</label><input type="number" id="min-wk" value="1"></div>
            </div>
            <h3 class="sub-title">Categories</h3>
            <div id="category-inputs">
                <div class="cat-row">
                    <input type="text" placeholder="Cat Name" class="cat-name">
                    <input type="number" placeholder="Base ($)" class="cat-base">
                    <input type="number" placeholder="Inc ($)" class="cat-inc">
                </div>
                <div class="cat-row">
                    <input type="text" placeholder="Cat Name" class="cat-name">
                    <input type="number" placeholder="Base ($)" class="cat-base">
                    <input type="number" placeholder="Inc ($)" class="cat-inc">
                </div>
            </div>
            <button class="btn-primary" style="background:#8b5cf6; margin-top:20px;" id="save-rules-btn" onclick="handleSaveRules()">Confirm & Save Rules</button>
        </section>

        <!-- STEP 4: PLAYER POOL -->
        <section id="player-section" class="setup-card hidden">
            <h2>Step 4: Player Pool</h2>
            <div class="form-grid">
                <div class="input-group"><label>Player Name</label><input type="text" id="player-name"></div>
                <div class="input-group"><label>Source Team / Club</label><input type="text" id="player-source"></div>
                <div class="input-group">
                    <label>Role</label>
                    <select id="player-role" class="custom-select">
                        <option value="Batsman">Batsman</option>
                        <option value="Bowler">Bowler</option>
                        <option value="All-Rounder">All-Rounder</option>
                        <option value="Wicket Keeper">Wicket Keeper</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="player-category" class="custom-select" onchange="updateBasePrice()">
                        <option value="">Select Category</option>
                        <!-- Options will be filled by code -->
                    </select>
                </div>
                <div class="input-group"><label>Base Price ($)</label><input type="number" id="player-base-price"></div>
                <div class="input-group"><label>Photo URL</label><input type="text" id="player-photo"></div>
            </div>
            <button class="btn-success" onclick="handleAddPlayer()">+ Add Player to Pool</button>

            <div id="player-list-container" style="margin-top:30px;">
                <h3 class="section-label">AUCTION POOL</h3>
                <div id="players-display" class="player-grid"></div>
            </div>
            
            <button class="btn-primary" style="margin-top:40px; background:#f43f5e;" onclick="startAuctionSetup()">Finalize & Launch Auction →</button>
        </section>

    </div>

    <script type="module">
        import { logout, saveLeague, addTeam, saveRules, addPlayer, updateBasePrice } from './script.js';
        window.handleLogout = logout;
        window.saveLeagueSettings = saveLeague;
        window.handleAddTeam = addTeam;
        window.handleSaveRules = saveRules;
        window.handleAddPlayer = addPlayer;
        window.updateBasePrice = updateBasePrice;

        window.showRulesSection = () => {
            document.getElementById('rules-section').classList.remove('hidden');
            document.getElementById('go-to-rules-btn').style.display = 'none';
            document.getElementById('rules-section').scrollIntoView({ behavior: 'smooth' });
        };
        
        window.startAuctionSetup = () => { alert("Almost ready! We will build the Live Auction Screen next."); };
    </script>
</body>
</html>
