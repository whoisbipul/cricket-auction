<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Auction Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>AUCTION<span>PRO</span></h1>
            <button onclick="handleLogout()" style="background:var(--danger); color:white; padding:8px 16px; border-radius:10px; cursor:pointer;">Logout</button>
        </header>

        <!-- STEP 1: LEAGUE SETUP -->
        <section id="league-section" class="setup-card">
            <h2>Step 1: League Setup</h2>
            <div id="league-saved-msg" class="hidden"><div style="background:rgba(34,197,94,0.1); color:var(--success); padding:15px; border-radius:12px; margin-bottom:20px; text-align:center; font-weight:700;">✓ League Configured</div></div>
            <div id="league-inputs">
                <div class="input-group"><label>League Name</label><input type="text" id="league-name" placeholder="e.g. Premier League"></div>
                <div class="input-group"><label>League Logo URL</label><input type="text" id="league-logo" placeholder="Paste link here"></div>
                <button class="btn-primary" onclick="saveLeagueSettings()">Confirm League Details</button>
            </div>
        </section>

        <!-- STEP 2: TEAM SETUP -->
        <section id="team-section" class="setup-card hidden">
            <h2>Step 2: Participating Teams</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Team Name</label><input type="text" id="team-name"></div>
                <div class="input-group"><label>Short Form</label><input type="text" id="team-short"></div>
            </div>
            <button class="btn-success" onclick="handleAddTeam()">+ Add Team to League</button>
            <div id="teams-display" class="team-grid"></div>
            <button class="btn-primary" style="margin-top:40px; background:#f59e0b;" id="go-to-rules-btn" onclick="showRulesSection()">Next: Define Auction Rules →</button>
        </section>

        <!-- STEP 3: RULES -->
        <section id="rules-section" class="setup-card hidden">
            <h2>Step 3: Auction Rules ($)</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Purse per Team</label><input type="number" id="purse-value" value="10000"></div>
                <div class="input-group"><label>Min Players</label><input type="number" id="min-players" value="11"></div>
                <div class="input-group"><label>Max Players</label><input type="number" id="max-players" value="15"></div>
            </div>
            <div id="category-inputs">
                <label>Categories & Increments</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:10px;">
                    <input type="text" placeholder="Cat A" class="cat-name">
                    <input type="number" placeholder="Base $" class="cat-base">
                    <input type="number" placeholder="Inc $" class="cat-inc">
                </div>
            </div>
            <button class="btn-primary" style="background:#8b5cf6;" onclick="handleSaveRules()">Save Rules & Continue</button>
        </section>

        <!-- STEP 4: PLAYER POOL -->
        <section id="player-section" class="setup-card hidden">
            <h2>Step 4: Player Pool</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Player Name</label><input type="text" id="player-name"></div>
                <div class="input-group"><label>Category</label><select id="player-category" onchange="updateBasePrice()"></select></div>
                <div class="input-group"><label>Base Price ($)</label><input type="number" id="player-base-price"></div>
                <div class="input-group"><label>Role</label><select id="player-role"><option>Batsman</option><option>Bowler</option><option>All-Rounder</option><option>WK</option></select></div>
            </div>
            <button class="btn-success" onclick="handleAddPlayer()">+ Add Player to Pool</button>
            <div id="players-display" class="player-grid"></div>
            <button class="btn-primary" style="margin-top:40px; background:#f59e0b;" id="go-to-access-btn" onclick="showAccessSection()">Next: Create Team Logins →</button>
        </section>

        <!-- STEP 5: TEAM LOGINS -->
        <section id="access-section" class="setup-card hidden" style="border: 2px solid var(--accent); background: #1a2230;">
            <h2 style="color:var(--accent);">Step 5: Create Team Login Access</h2>
            <p style="color:var(--text-muted); font-size:13px; margin-bottom:20px;">Create separate accounts for your friends.</p>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Select Team</label><select id="login-team-select"></select></div>
                <div class="input-group"><label>Assign Password</label><input type="text" id="team-pass-setup" placeholder="e.g. team123"></div>
            </div>
            <button class="btn-primary" onclick="handleCreateTeamLogin()">Create Account</button>
            <hr style="border:0; border-top:1px solid #30363d; margin:30px 0;">
            <button class="btn-primary" style="background:var(--danger);" onclick="window.location.href='auction.html'">Finalize & Launch Live Auction →</button>
        </section>
    </div>

    <script type="module">
        import { logout, saveLeague, addTeam, saveRules, addPlayer, updateBasePrice, createTeamUser } from './script.js';
        window.handleLogout = logout;
        window.saveLeagueSettings = saveLeague;
        window.handleAddTeam = addTeam;
        window.handleSaveRules = saveRules;
        window.handleAddPlayer = addPlayer;
        window.updateBasePrice = updateBasePrice;
        window.handleCreateTeamLogin = createTeamUser;
        
        // Navigation Functions
        window.showRulesSection = () => {
            document.getElementById('rules-section').classList.remove('hidden');
            document.getElementById('go-to-rules-btn').classList.add('hidden');
            document.getElementById('rules-section').scrollIntoView({behavior:'smooth'});
        };
        window.showAccessSection = () => {
            document.getElementById('access-section').classList.remove('hidden');
            document.getElementById('go-to-access-btn').classList.add('hidden');
            document.getElementById('access-section').scrollIntoView({behavior:'smooth'});
        };
    </script>
</body>
</html>
