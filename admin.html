<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Auction Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <header>
            <h1>AUCTION<span>PRO</span></h1>
            <button onclick="handleLogout()" class="btn-danger" style="padding:8px 16px; font-size:12px;">Logout</button>
        </header>

        <!-- STEP 1 -->
        <section id="league-section" class="setup-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Step 1: League Setup</h2>
                <button onclick="resetLeague()" class="btn-delete">Clear League</button>
            </div>
            <div id="league-saved-msg" class="hidden"><div style="background:rgba(34,197,94,0.1); color:var(--success); padding:15px; border-radius:12px; margin-bottom:20px; text-align:center; font-weight:700;">✓ League Configured</div></div>
            <div id="league-inputs">
                <div class="input-group"><label>League Name</label><input type="text" id="league-name"></div>
                <div class="input-group"><label>League Logo URL</label><input type="text" id="league-logo" placeholder="https://..."></div>
                <button class="btn-primary" onclick="saveLeagueSettings()">Confirm League Details</button>
            </div>
        </section>

        <!-- STEP 2 -->
        <section id="team-section" class="setup-card hidden">
            <h2>Step 2: Participating Teams</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Team Name</label><input type="text" id="team-name"></div>
                <div class="input-group"><label>Short Form</label><input type="text" id="team-short"></div>
            </div>
            <button class="btn-success" onclick="handleAddTeam()">+ Add Team</button>
            <div id="teams-display" class="team-grid"></div>
            <button class="btn-primary" style="margin-top:40px; background:#f59e0b;" id="go-to-rules-btn" onclick="showRulesSection()">Next: Define Rules →</button>
        </section>

        <!-- STEP 3 -->
        <section id="rules-section" class="setup-card hidden">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Step 3: Auction Rules ($)</h2>
                <button onclick="resetRules()" class="btn-delete">Reset Rules</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Purse per Team</label><input type="number" id="purse-value" value="10000"></div>
                <div class="input-group"><label>Min Players</label><input type="number" id="min-players" value="11"></div>
                <div class="input-group"><label>Max Players</label><input type="number" id="max-players" value="15"></div>
            </div>
            <label>Categories (Fixed A, B, C)</label>
            <div class="cat-row"><input type="text" value="Category A" readonly><input type="number" placeholder="Base $" class="cat-base"><input type="number" placeholder="Inc $" class="cat-inc"></div>
            <div class="cat-row"><input type="text" value="Category B" readonly><input type="number" placeholder="Base $" class="cat-base"><input type="number" placeholder="Inc $" class="cat-inc"></div>
            <div class="cat-row"><input type="text" value="Category C" readonly><input type="number" placeholder="Base $" class="cat-base"><input type="number" placeholder="Inc $" class="cat-inc"></div>
            <button class="btn-primary" style="background:#8b5cf6;" onclick="handleSaveRules()">Save Rules & Continue</button>
        </section>

        <!-- STEP 4 -->
        <section id="player-section" class="setup-card hidden">
            <h2>Step 4: Player Pool</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Player Name</label><input type="text" id="player-name"></div>
                <div class="input-group"><label>Category</label><select id="player-category" onchange="updateBasePrice()"></select></div>
                <div class="input-group"><label>Base Price ($)</label><input type="number" id="player-base-price"></div>
                <div class="input-group"><label>Role</label><select id="player-role"><option>Batsman</option><option>Bowler</option><option>All-Rounder</option><option>WK</option></select></div>
                <div class="input-group" style="grid-column: span 2;"><label>Player Photo URL</label><input type="text" id="player-photo" placeholder="Paste link from ImgBB or Google here"></div>
            </div>
            <button class="btn-success" onclick="handleAddPlayer()">+ Add Player to Pool</button>
            <div id="players-display" class="player-grid"></div>
            <button class="btn-primary" style="margin-top:40px; background:#f59e0b;" id="go-to-access-btn" onclick="showAccessSection()">Next: Create Logins →</button>
        </section>

        <!-- STEP 5 -->
        <section id="access-section" class="setup-card hidden">
            <h2>Step 5: Team Access</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="input-group"><label>Select Team</label><select id="login-team-select"></select></div>
                <div class="input-group"><label>Password</label><input type="text" id="team-pass-setup"></div>
            </div>
            <button class="btn-primary" onclick="handleCreateTeamLogin()">Create Account</button>
            <hr style="border:0; border-top:1px solid #30363d; margin:30px 0;">
            <button class="btn-primary" style="background:var(--danger);" onclick="window.location.href='auction.html'">Launch Live Auction →</button>
        </section>
    </div>

    <script type="module">
        import { logout, saveLeague, addTeam, saveRules, addPlayer, updateBasePrice, createTeamUser, deleteTeam, deletePlayer, resetLeague, resetRules } from './script.js';
        window.handleLogout = logout; window.saveLeagueSettings = saveLeague; window.handleAddTeam = addTeam;
        window.handleSaveRules = saveRules; window.handleAddPlayer = addPlayer; window.updateBasePrice = updateBasePrice;
        window.handleCreateTeamLogin = createTeamUser; window.handleDeleteTeam = deleteTeam; window.handleDeletePlayer = deletePlayer;
        window.resetLeague = resetLeague; window.resetRules = resetRules;
        window.showRulesSection = () => { document.getElementById('rules-section').classList.remove('hidden'); document.getElementById('go-to-rules-btn').classList.add('hidden'); };
        window.showAccessSection = () => { document.getElementById('access-section').classList.remove('hidden'); document.getElementById('go-to-access-btn').classList.add('hidden'); };
    </script>
</body>
</html>
