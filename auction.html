<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE STAGE | Auction Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auction-container">
        <header>
            <h1 id="live-league-name">AUCTION<span>LIVE</span></h1>
            <div id="timer-box" style="text-align:right;">
                <span style="font-size:10px; font-weight:800; color:var(--text-muted);">TIME TO BID</span>
                <div id="timer-display" style="font-size:3rem; font-weight:900; color:var(--danger);">30s</div>
            </div>
        </header>

        <!-- MAIN AUCTION GRID -->
        <div class="auction-main-grid">
            <div class="player-stage-card">
                <div id="player-status-badge" class="status-badge status-active">ACTIVE</div>
                <img id="display-p-img" src="https://via.placeholder.com/300" alt="Player">
                <h2 id="display-p-name">Waiting...</h2>
                <div style="display:flex; justify-content:center; gap:20px; color:var(--text-muted); font-weight:700;">
                    <span id="display-p-role">---</span> | <span id="display-p-cat">---</span>
                </div>
            </div>

            <div class="bidding-side">
                <div class="bidding-card">
                    <div class="bid-stat"><label>Base Price</label><h3 id="display-p-base">$0</h3></div>
                    <div class="bid-stat high-bid"><label>Current Bid</label><h3 id="display-p-current-bid">$0</h3></div>
                    <div class="bid-stat"><label>Highest Bidder</label><h4 id="display-p-bidder">None</h4></div>

                    <div id="admin-controls">
                        <select id="auction-category-select" style="margin-bottom:15px;"></select>
                        <button class="btn-primary" onclick="startNextPlayer()">GET NEXT PLAYER</button>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                            <button class="btn-success" onclick="handleSellPlayer()">SOLD</button>
                            <button style="background:var(--danger); color:white; border-radius:14px; cursor:pointer;" onclick="handleUnsoldPlayer()">UNSOLD</button>
                        </div>
                    </div>

                    <div id="team-controls">
                        <button class="btn-bid" style="background:var(--accent); width:100%; font-size:1.8rem; padding:20px; border-radius:18px;" onclick="placeBid()">BID NOW</button>
                    </div>
                </div>

                <!-- TEAM PURSE DISPLAY -->
                <div id="my-team-stats" class="setup-card hidden" style="margin-top:20px; padding:20px; border-color:var(--success); background: rgba(34, 197, 94, 0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span style="font-size:10px; font-weight:800; color:var(--success);">TEAM:</span>
                            <div id="my-team-name" style="font-weight:900; font-size:1.2rem; color:white;">---</div>
                        </div>
                        <div style="text-align:right;">
                            <span style="font-size:10px; font-weight:800; color:var(--success);">REMAINING PURSE:</span>
                            <div id="my-team-purse" style="font-size:1.8rem; font-weight:900; color:var(--success);">$0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SQUAD TRACKER SECTION -->
        <div class="auction-main-grid" style="margin-top:40px;">
            <!-- GLOBAL SOLD LIST -->
            <div class="setup-card" style="padding:25px;">
                <h3 style="font-size:14px; color:var(--accent); margin-bottom:20px;">SQUAD TRACKER (ALL SOLD PLAYERS)</h3>
                <table class="auction-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Bought By</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="global-sold-list">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>

            <!-- PERSONAL SQUAD LIST (Visible only to teams) -->
            <div id="personal-squad-section" class="setup-card hidden" style="padding:25px; border-color:var(--accent);">
                <h3 style="font-size:14px; color:var(--accent); margin-bottom:20px;">MY SQUAD</h3>
                <table class="auction-table">
                    <thead>
                        <tr>
                            <th>Player</th>
                            <th>Role/Cat</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="my-squad-list">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { nextPlayer, sellPlayer, unsoldPlayer, bid } from './script.js';
        window.startNextPlayer = nextPlayer; window.handleSellPlayer = sellPlayer;
        window.handleUnsoldPlayer = unsoldPlayer; window.placeBid = bid;
    </script>
</body>
</html>
