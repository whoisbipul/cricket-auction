<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Auction Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2 id="league-name-display">Fantasy Cricket Auction</h2>
        <div id="login-box">
            <h3>Login</h3>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
            <p id="error-message" style="color: red;"></p>
        </div>
    </div>

    <!-- This part connects your website to Firebase -->
    <script type="module">
        // We will put the logic in script.js
        import { loginUser } from './script.js';
        window.handleLogin = loginUser;
    </script>
</body>
</html>
